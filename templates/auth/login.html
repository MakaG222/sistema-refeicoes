{% extends "base.html" %}
{% block content %}
    <div class="login-wrap" role="main" aria-label="Autenticação">
      <div class="login-box">
        <div class="login-header login-header-col">
          <img src="/static/logo_escola_naval.jpg" class="login-logo" alt="Brasão da Escola Naval Portuguesa">
          <div class="login-title">Escola Naval</div>
        </div>
        {% if error %}
        <div class="alert alert-error" role="alert">{{ error }}</div>
        {% endif %}
        <form method="post" aria-label="Formulário de login">
          {{ csrf_input() }}
          <div class="form-group">
            <label for="nii-input">NII</label>
            <input id="nii-input" type="text" name="nii" maxlength="32" autofocus autocomplete="username" required placeholder="O teu NII (ex: 24123)" aria-required="true">
          </div>
          <div class="form-group">
            <label for="pw-input">Password</label>
            <input id="pw-input" type="password" name="pw" maxlength="256" autocomplete="current-password" required placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" aria-required="true">
          </div>
          <button type="submit" class="btn btn-primary login-btn" aria-label="Iniciar sessão">
            Entrar
          </button>
        </form>
      </div>
    </div>
{% endblock %}
