{% extends "base.html" %}
{% block content %}
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-header login-header-col">
          <img src="/static/logo_escola_naval.jpg" class="login-logo" alt="Escola Naval">
          <div class="login-title">Escola Naval</div>
        </div>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post">
          {{ csrf_input() }}
          <div class="form-group">
            <label>NII</label>
            <input type="text" name="nii" maxlength="32" autofocus autocomplete="username" required placeholder="O teu NII (ex: 24123)">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="pw" maxlength="256" autocomplete="current-password" required placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;">
          </div>
          <button type="submit" class="btn btn-primary login-btn">
            Entrar
          </button>
        </form>
      </div>
    </div>
{% endblock %}
